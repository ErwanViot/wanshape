<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>Wan2Fit — Séance de sport gratuite chaque jour, sans matériel</title>
    <meta name="description" content="Ton programme sport gratuit. Chaque jour, une séance complète t'attend : échauffement, exercices, repos, étirements — tout est guidé et timé. 25-40 min, sans matériel." />
    <meta name="keywords" content="sport maison, séance sport gratuite, exercices sans matériel, entraînement guidé gratuit, entraînement quotidien, fitness maison, sport à la maison" />
    <link rel="canonical" href="https://www.wan2fit.fr/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wan2Fit — Sport gratuit chaque jour, guidé et sans matériel" />
    <meta property="og:description" content="Une séance complète chaque jour : échauffement, renforcement, étirements. Gratuit pour commencer, programmes IA personnalisés avec Premium." />
    <meta property="og:image" content="https://www.wan2fit.fr/og-image.jpg" />
    <meta property="og:url" content="https://www.wan2fit.fr/" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Wan2Fit" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wan2Fit — Sport gratuit chaque jour, guidé et sans matériel" />
    <meta name="twitter:description" content="Séance de sport complète chaque jour, sans matériel. Gratuit pour commencer, programmes IA personnalisés avec Premium." />
    <meta name="twitter:image" content="https://www.wan2fit.fr/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Wan2Fit",
      "url": "https://wan2fit.fr",
      "description": "Séance de sport gratuite chaque jour. Programmes guidés et personnalisés par IA. Sans matériel.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Gratuit",
          "price": "0",
          "priceCurrency": "EUR"
        },
        {
          "@type": "Offer",
          "name": "Premium mensuel",
          "price": "9.99",
          "priceCurrency": "EUR",
          "billingIncrement": 1,
          "billingDuration": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Premium annuel",
          "price": "99.99",
          "priceCurrency": "EUR",
          "billingIncrement": 1,
          "billingDuration": "P1Y"
        }
      ],
      "inLanguage": "fr",
      "creator": {
        "@type": "Organization",
        "name": "WAN SOFT"
      },
      "author": {
        "@type": "Organization",
        "name": "WAN SOFT",
        "url": "https://www.wan-soft.fr"
      }
    }
    </script>

    <!-- PWA -->
    <meta name="theme-color" content="#0f0f17" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wan2Fit" />

    <!-- Fonts: self-hosted, see src/styles/fonts.css. -->

    <!-- LCP preload: visitor hero image. ~96 KB, downloaded in parallel
         with the JS bundle so it lands before VisitorContent mounts. -->
    <link rel="preload" as="image" href="/images/hero-landing-couple.webp" fetchpriority="high" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

  </head>
  <body>
    <!--
      Theme flash prevention — synchronous, external (kept out of inline
      script-src). IMPORTANT: never add `defer` or `async` here. The script
      must block the parser so the <html data-theme> attribute is set
      BEFORE the first paint, otherwise users on light theme see a dark
      flash while React hydrates.
    -->
    <script src="/theme-init.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
